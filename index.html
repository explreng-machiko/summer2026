<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>夏休み 計画表 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --accent: #f4a825;
    --accent2: #3d7ebf;
    --text: #1a1a1a;
    --muted: #999;
    --border: #e8e8e8;
    --done-bg: #edf6ec;
    --done-fg: #4caf50;
  }

  body {
    font-family: -apple-system, 'Hiragino Sans', 'BIZ UDPGothic', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 16px 12px 32px;
    color: var(--text);
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  header .year { font-size: 0.75rem; color: var(--muted); }

  /* ===== PROGRESS ===== */
  #progress-wrap {
    background: var(--card);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .progress-label { font-size: 0.78rem; color: var(--muted); }
  #progress-count { font-size: 0.85rem; font-weight: 600; color: var(--accent); }
  #progress-bar-outer {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  #progress-bar-inner {
    background: var(--accent);
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    background: var(--border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 14px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .section { display: none; }
  .section.active { display: block; }

  /* ===== CALENDAR ===== */
  .cal-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 12px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .month-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-header {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--muted);
    padding: 3px 0 6px;
  }
  .cal-header:first-child { color: #e05252; }
  .cal-header:last-child  { color: var(--accent2); }

  .cal-day {
    height: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s;
    position: relative;
  }
  .cal-day:active { transform: scale(0.88); }
  .cal-day.empty { cursor: default; }
  .cal-day.not-summer { color: #ddd; cursor: default; }
  .cal-day.summer { color: var(--text); }
  .cal-day.done {
    background: var(--done-bg);
    color: var(--done-fg);
    font-weight: 700;
  }
  .cal-day.today {
    background: var(--accent) !important;
    color: white !important;
    font-weight: 700;
  }
  .cal-day.weekend-sun.summer { color: #e05252; }
  .cal-day.weekend-sat.summer { color: var(--accent2); }
  .cal-day.done .dot,
  .cal-day.summer .dot { display: none; }
  .done-mark {
    font-size: 0.55rem;
    margin-top: 1px;
    opacity: 0.8;
  }

  .cal-legend {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    font-size: 0.68rem;
    color: var(--muted);
  }
  .legend-swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 3px;
    vertical-align: middle;
    margin-right: 3px;
  }

  /* ===== TASKS ===== */
  .task-category { margin-bottom: 16px; }
  .cat-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-title .cat-count {
    margin-left: auto;
    font-size: 0.7rem;
    color: var(--accent);
    font-weight: 600;
  }

  .task-item {
    background: var(--card);
    border-radius: 12px;
    padding: 13px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: transform 0.1s, opacity 0.15s;
    user-select: none;
  }
  .task-item:active { transform: scale(0.97); }
  .task-item.done { opacity: 0.55; }

  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 0.7rem;
  }
  .task-item.done .task-check {
    background: var(--done-fg);
    border-color: var(--done-fg);
    color: white;
  }
  .task-text {
    font-size: 0.92rem;
    font-weight: 500;
  }
  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* Add button */
  #add-task-btn {
    width: 100%;
    padding: 13px;
    background: var(--card);
    color: var(--accent);
    border: 2px dashed var(--accent);
    border-radius: 12px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s;
  }
  #add-task-btn:active { background: #fdf3e0; }

  /* ===== MODAL ===== */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  #modal-overlay.show { display: flex; }
  #modal-box {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 36px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  #modal-box h3 { text-align: center; margin-bottom: 16px; font-size: 0.95rem; color: var(--muted); font-weight: 600; }
  #modal-box input, #modal-box select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 0.95rem;
    margin-bottom: 10px;
    outline: none;
    background: var(--bg);
  }
  #modal-box input:focus, #modal-box select:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
  }
  #modal-cancel { background: var(--border); color: var(--muted); }
  #modal-ok { background: var(--accent); color: white; }

  /* ===== BURST ===== */
  .burst {
    position: fixed; pointer-events: none; font-size: 1.4rem;
    z-index: 200; animation: burstAnim 0.6s forwards;
  }
  @keyframes burstAnim {
    0%   { opacity: 1; transform: scale(0.5) translateY(0); }
    80%  { opacity: 1; transform: scale(1.3) translateY(-30px); }
    100% { opacity: 0; transform: scale(1.6) translateY(-60px); }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>☀️ 夏休み 計画表</h1>
    <div class="year">2026</div>
  </div>
</header>

<!-- Progress -->
<div id="progress-wrap">
  <div class="progress-row">
    <span class="progress-label">今日までの達成状況</span>
    <span id="progress-count">0 / 0 個</span>
  </div>
  <div id="progress-bar-outer"><div id="progress-bar-inner" style="width:0%"></div></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" id="tab-calendar" onclick="switchTab('calendar')">📅 カレンダー</button>
  <button class="tab-btn" id="tab-tasks" onclick="switchTab('tasks')">📋 やる事</button>
</div>

<!-- Calendar -->
<div id="section-calendar" class="section active">
  <div class="cal-card">
    <div class="month-title">JULY · 7月</div>
    <div class="cal-grid" id="cal-july"></div>
  </div>
  <div class="cal-card">
    <div class="month-title">AUGUST · 8月</div>
    <div class="cal-grid" id="cal-aug"></div>
  </div>
  <div class="cal-legend">
    <span><span class="legend-swatch" style="background:var(--done-bg);border:1px solid var(--done-fg)"></span>達成</span>
    <span><span class="legend-swatch" style="background:var(--accent)"></span>今日</span>
  </div>
</div>

<!-- Tasks -->
<div id="section-tasks" class="section">
  <div id="task-list"></div>
  <button id="add-task-btn" onclick="openModal()">＋ やる事を追加する</button>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h3>やる事を追加</h3>
    <input id="modal-text" type="text" placeholder="例：自由研究" maxlength="30">
    <select id="modal-category">
      <option value="勉強">📚 勉強</option>
      <option value="運動">🏃 運動</option>
      <option value="生活">🏠 生活</option>
      <option value="楽しみ">🎉 楽しみ</option>
    </select>
    <div class="modal-btns">
      <button id="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button id="modal-ok" onclick="addTask()">追加</button>
    </div>
  </div>
</div>

<script>
const SUMMER_START_JULY = 19;
const TODAY = new Date();
const TODAY_STR = `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;

const CATEGORIES = {
  '勉強': { emoji: '📚' },
  '運動': { emoji: '🏃' },
  '生活': { emoji: '🏠' },
  '楽しみ': { emoji: '🎉' },
};

function loadData() {
  return JSON.parse(localStorage.getItem('summer2026') || '{"days":{},"tasks":[]}');
}
function saveData(d) { localStorage.setItem('summer2026', JSON.stringify(d)); }

let data = loadData();

if (data.tasks.length === 0) {
  data.tasks = [
    { id: 1, text: '公文をやる',          cat: '勉強', done: false },
    { id: 2, text: 'CTP5 音読チャレンジ', cat: '勉強', done: false },
    { id: 3, text: 'Kids Up',             cat: '勉強', done: false },
    { id: 4, text: 'スイミング',           cat: '運動', done: false },
    { id: 5, text: 'お手伝い 1つ',         cat: '生活', done: false },
  ];
  saveData(data);
}

// ===== CALENDAR =====
function isSummer(month, day) {
  return (month === 7 && day >= SUMMER_START_JULY) || month === 8;
}

function buildCalendar(containerId, year, month) {
  const container = document.getElementById(containerId);
  ['日','月','火','水','木','金','土'].forEach(h => {
    const d = document.createElement('div');
    d.className = 'cal-header';
    d.textContent = h;
    container.appendChild(d);
  });

  const firstDay = new Date(year, month-1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div'); e.className = 'cal-day empty';
    container.appendChild(e);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dow = (firstDay + day - 1) % 7;
    const key = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const summer = isSummer(month, day);
    const done = !!data.days[key];
    const isToday = key === TODAY_STR;

    const el = document.createElement('div');
    el.className = 'cal-day';
    if (!summer) { el.classList.add('not-summer'); el.innerHTML = `<span>${day}</span>`; }
    else {
      el.classList.add('summer');
      if (done) el.classList.add('done');
      if (isToday) el.classList.add('today');
      if (dow === 0 && !done && !isToday) el.classList.add('weekend-sun');
      if (dow === 6 && !done && !isToday) el.classList.add('weekend-sat');
      el.innerHTML = `<span>${day}</span><span class="done-mark">${done ? '✓' : ''}</span>`;
      el.addEventListener('click', () => toggleDay(key, el));
    }
    container.appendChild(el);
  }
}

function toggleDay(key, el) {
  data.days[key] = !data.days[key];
  saveData(data);
  const done = data.days[key];
  el.classList.toggle('done', done);
  el.querySelector('.done-mark').textContent = done ? '✓' : '';
  if (done) burst(el);
  updateProgress();
}

// ===== TASKS =====
function renderTasks() {
  const container = document.getElementById('task-list');
  container.innerHTML = '';
  const catOrder = ['勉強','運動','生活','楽しみ'];
  catOrder.forEach(cat => {
    const items = data.tasks.filter(t => t.cat === cat);
    if (!items.length) return;
    const doneCount = items.filter(t => t.done).length;
    const catDiv = document.createElement('div');
    catDiv.className = 'task-category';
    catDiv.innerHTML = `<div class="cat-title">${CATEGORIES[cat].emoji} ${cat}<span class="cat-count">${doneCount}/${items.length}</span></div>`;
    items.forEach(task => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' done' : '');
      item.innerHTML = `<div class="task-check">${task.done ? '✓' : ''}</div><div class="task-text">${task.text}</div>`;
      item.addEventListener('click', () => toggleTask(task.id));
      catDiv.appendChild(item);
    });
    container.appendChild(catDiv);
  });
}

function toggleTask(id) {
  const task = data.tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  saveData(data);
  if (task.done) {
    const items = document.querySelectorAll('.task-item');
    items.forEach(el => { if (el.querySelector('.task-text')?.textContent === task.text) burst(el); });
  }
  renderTasks();
  updateProgress();
}

// ===== PROGRESS =====
function updateProgress() {
  const total = data.tasks.length;
  const done  = data.tasks.filter(t => t.done).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-bar-inner').style.width = pct + '%';
  document.getElementById('progress-count').textContent = `${done} / ${total} 個 (${pct}%)`;
}

// ===== MODAL =====
function openModal() {
  document.getElementById('modal-text').value = '';
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('modal-text').focus(), 200);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function addTask() {
  const text = document.getElementById('modal-text').value.trim();
  const cat  = document.getElementById('modal-category').value;
  if (!text) return;
  data.tasks.push({ id: Date.now(), text, cat, done: false });
  saveData(data);
  renderTasks();
  updateProgress();
  closeModal();
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ===== BURST =====
function burst(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  ['⭐','✨','🎉'].forEach((e,i) => {
    const div = document.createElement('div');
    div.className = 'burst';
    div.textContent = e;
    div.style.left = (cx + (Math.random()-0.5)*50) + 'px';
    div.style.top  = (cy + (Math.random()-0.5)*30) + 'px';
    div.style.animationDelay = (i*0.07) + 's';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 700);
  });
}

// ===== INIT =====
buildCalendar('cal-july', 2026, 7);
buildCalendar('cal-aug',  2026, 8);
renderTasks();
updateProgress();
</script>
</body>
</html>
